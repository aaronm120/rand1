# Nginx reverse proxy config for Randolph Office Center Portal
# Place at: /etc/nginx/sites-available/randolph-portal
# Enable:   ln -s /etc/nginx/sites-available/randolph-portal /etc/nginx/sites-enabled/
# Reload:   nginx -t && systemctl reload nginx

server {
    listen 80;
    server_name your-domain.com;  # Replace with your actual domain or IP

    # Redirect HTTP → HTTPS (uncomment after setting up SSL)
    # return 301 https://$host$request_uri;

    # Max upload size (match MAX_FILE_SIZE_MB in .env)
    client_max_body_size 15M;

    # Proxy all traffic to the Node.js app
    location / {
        proxy_pass         http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection 'upgrade';
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 60s;
    }
}

