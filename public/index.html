<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Randolph Office Center — Tenant Portal</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' fill='%231B3A6B' rx='4'/><text y='24' x='4' font-size='20' fill='white'>🏢</text></svg>">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="stylesheet" href="/css/styles.css">
</head>
<body>

<!-- Toast container -->
<div id="toasts" aria-live="polite"></div>

<!-- Modal -->
<div id="modal-overlay" class="modal-overlay hidden" onclick="if(event.target===this)closeModal()">
  <div id="modal-box" class="modal-box">
    <div id="modal-inner"></div>
  </div>
</div>

<!-- Maintenance screen -->
<div id="maintenance-screen" class="hidden" style="position:fixed;inset:0;background:var(--bg,#F0F4F9);z-index:9999;display:flex;align-items:center;justify-content:center"></div>

<!-- Auth screen -->
<div id="auth-screen" class="auth-screen hidden">
  <div class="auth-card-wrap">
    <div class="auth-brand">
      <div class="auth-brand-icon" id="auth-brand-icon">🏢</div>
      <div>
        <div class="auth-brand-name" id="auth-brand-name">Randolph Office Center</div>
        <div class="auth-brand-tagline" id="auth-brand-tagline">Tenant Portal</div>
      </div>
    </div>
    <div id="auth-form-container"></div>
  </div>
</div>

<!-- App shell -->
<div id="app-shell" class="app-shell hidden">
  <!-- Sidebar -->
  <aside id="sidebar" class="sidebar">
    <div class="sidebar-brand">
      <span class="sidebar-brand-icon" id="sb-icon">🏢</span>
      <div class="sidebar-brand-text">
        <div class="sidebar-brand-name" id="sb-name">Randolph Office Center</div>
        <div class="sidebar-brand-tag" id="sb-tag">Tenant Portal</div>
      </div>
    </div>
    <nav id="sidebar-nav" class="sidebar-nav"></nav>
    <div class="sidebar-footer">
      <div class="sidebar-user" id="sidebar-user" onclick="navigate('profile')" title="Profile &amp; Settings"></div>
    </div>
  </aside>
  <div id="sidebar-backdrop" class="sidebar-backdrop hidden" onclick="closeSidebar()"></div>

  <!-- Main area -->
  <div class="main-area">
    <header class="topbar">
      <button class="topbar-menu-btn" onclick="toggleSidebar()" aria-label="Menu">
        <span></span><span></span><span></span>
      </button>
      <div id="page-title-area" class="page-title-area"></div>
      <div class="topbar-right">
        <button class="btn btn-ghost btn-sm" onclick="signOut()" title="Sign out" style="gap:6px">
          <svg width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/></svg>
          <span class="hide-xs">Sign out</span>
        </button>
      </div>
    </header>
    <main id="page-content" class="page-content"></main>
  </div>
</div>

<script src="/js/core.js"></script>
<script src="/js/auth.js"></script>
<script src="/js/dashboard.js"></script>
<script src="/js/requests.js"></script>
<script src="/js/announcements.js"></script>
<script src="/js/bookings.js"></script>
<script src="/js/directory.js"></script>
<script src="/js/leases.js"></script>
<script src="/js/admin.js"></script>
<script src="/js/profile.js"></script>
<script>
(async function boot() {
  try {
    const settings = await apiFetch('GET', '/api/settings');
    state.settings = settings;
    applyTheme(settings);
    updateBranding(settings);
  } catch(_) {}

  const maintenance = state.settings.maintenance_mode === '1' || state.settings.maintenance_mode === 'true';

  if (maintenance) {
    // PM users bypass maintenance mode; everyone else sees the maintenance screen
    if (state.token) {
      try {
        state.user = await apiFetch('GET', '/api/auth/me');
        if (isPM(state.user)) {
          if (localStorage.getItem('roc_admin_token') && !state.user.impersonatedBy) {
            const payload = decodeJWTPayload(state.token);
            if (payload.impersonatedBy) {
              state.user.impersonatedBy     = payload.impersonatedBy;
              state.user.impersonatedByName = payload.impersonatedByName;
            }
          }
          showApp();
          return;
        }
      } catch(_) {
        localStorage.removeItem('roc_token');
        state.token = null;
      }
    }
    showMaintenance(state.settings);
    return;
  }

  if (state.token) {
    try {
      state.user = await apiFetch('GET', '/api/auth/me');
      // Restore impersonation context after a page reload — /api/auth/me never
      // returns impersonatedBy, so decode it from the JWT payload directly.
      if (localStorage.getItem('roc_admin_token') && !state.user.impersonatedBy) {
        const payload = decodeJWTPayload(state.token);
        if (payload.impersonatedBy) {
          state.user.impersonatedBy     = payload.impersonatedBy;
          state.user.impersonatedByName = payload.impersonatedByName;
        }
      }
      showApp();
    } catch(_) {
      localStorage.removeItem('roc_token');
      state.token = null;
      showAuth('login');
    }
  } else {
    showAuth('login');
  }
})();
</script>
</body>
</html>
